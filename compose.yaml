services:
  app:
    env_file:
      - .env
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - COOKIE_SECURE=true
    volumes:
      - ./data/db:/app/data/db
      - ./data/files:/app/data/files
    depends_on:
      meilisearch:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - arctic

  setup-auth:
    env_file:
      - .env
    build:
      context: .
      dockerfile: Dockerfile
    profiles: [tools]
    volumes:
      - ./data/db:/app/data/db
    command: node /app/scripts/setup-auth.mjs
    networks:
      - arctic

  meilisearch:
    env_file:
      - .env
    image: getmeili/meilisearch:latest
    environment:
      - MEILI_NO_ANALYTICS=true
      - MEILI_ENV=production
    volumes:
      - ./data/meili:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - arctic

networks:
  arctic:
    driver: bridge
